# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  extras:
    url: github:sagikazarmark/devenv-extras
    overlays:
      - default
  dagger:
    url: github:dagger/nix
    inputs:
      nixpkgs:
        follows: nixpkgs

imports:
  - extras/modules
